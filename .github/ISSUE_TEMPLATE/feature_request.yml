name: Feature request
description: Suggest an enhancement or new capability.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem first, the solution second.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case isn't covered today? What pain are you (or a user) experiencing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one is preferred.

  - type: input
    id: spec
    attributes:
      label: Related spec / plan section
      description: Reference to `docs/superpowers/specs/` or `docs/superpowers/plans/` if applicable.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
